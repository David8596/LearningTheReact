
<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial;
      }
      .send-button {
        background-color: rgb(0, 206, 14);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
      }
      
      .chat-message-robot {
        display: flex;
      }

      .chat-message-text {
         background-color: rgb(238, 238, 238);
         padding: 15px 20px;
         border-radius: 10px;
         margin-right: 10px;
         margin-left: 10px;
         margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput({ chatMessages, setChatMessages }){
          const [inputText, setInputText] = React.useState('')

          function saveInputText(event){
            setInputText(event.target.value)
          }

          function sendMessage(){
            const currentInputText = inputText;
            if (inputText === ''){
              return
            }
            setInputText('');

            setChatMessages(prevChatMessages => [
              ...prevChatMessages,
            {
              message: currentInputText,
              sender: "user",
              id: crypto.randomUUID()
            }])

            const response = Chatbot.getResponse(inputText);
            setChatMessages(prevChatMessages => [
              ...prevChatMessages,
              {
                message: response,
                sender: "robot",
                id: crypto.randomUUID()
              }
            ]);
          }
          
          function getKeyFormKeyboard(event){
            if (event.key === 'Enter'){
              sendMessage();
            }
            else if (event.key === 'Escape'){
              setInputText('');
            }
          }

          return (
            <div className='chat-input-container'>
            <input 
              placeholder="Send a message to ChatBot" 
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={getKeyFormKeyboard}
              className='chat-input'
              />
            <button
              onClick={sendMessage}
              className='send-button'
            >Send</button>
            </div>
          );
        }

        function ChatMessage({ message, sender}){
          return (
            <div className={
              sender === "user" 
                ? 'chat-message-user' 
                : 'chat-message-robot'
              }>
              {sender === 'robot' && <img src="images/robot.ico" width="50"/>}
              <div 
              className="chat-message-text"
              >
                {message}
              </div>
              {sender === 'user' && <img src="images/user.ico" width="50"/>}
            </div>
          );
        }
        
        function ChatMessages({ chatMessages, setChatMessages }){
          
          return (
            <>
            {chatMessages.map(({ message, sender, id }) => {
                return (
                  <ChatMessage 
                    message={message} 
                    sender={sender}
                    key={id}
                  />
                )
              })}
              </>
            );
          }

        function App(){
          const [chatMessages, setChatMessages] = React.useState([{
          message: "Hi",
          sender: "user",
          id: crypto.randomUUID() 
          },
          {
          message: "Hello, how can I help you?",
          sender: "robot",
          id: crypto.randomUUID() 
          },
          {
          message: "Can you me todays date?",
          sender: "user",
          id: crypto.randomUUID() 
          },
          {
          message: "Today is March 17",
          sender: "robot",
          id: crypto.randomUUID() 
          }])
          return (
            <div className="app-container">
              <ChatInput
               chatMessages={chatMessages}
               setChatMessages={setChatMessages}
              />
              <ChatMessages
               chatMessages={chatMessages}
               setChatMessages={setChatMessages}
               />
            </div>
          )
        }
        
        const container = document.querySelector('.js-container');

        ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
